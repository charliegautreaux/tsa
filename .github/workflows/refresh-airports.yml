name: Refresh Airport Data

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-airports
  cancel-in-progress: true

jobs:
  refresh:
    name: Fetch FAA Data & Update Seed
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest FAA airport data
        run: npx tsx scripts/fetch-faa-airports.ts

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/data/airports-seed.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit & push updated seed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/airports-seed.json
          git commit -m "chore: refresh airport seed data from FAA NPIAS"
          git push
